task_analysis:
  description: >
    使用 Report Reader Tool 读取 Report/ 文件夹中的 PDF / Word / Markdown / TXT 研报全文。
    Report Reader Tool 会把全文缓存到 outputs/report_text_cache.md，并且每次只返回一段文本。
    如果返回内容显示 [TRUNCATED]，必须继续用更大的 start_char 分块读取后续内容，不要只根据第一段下结论。
    然后提取全文逻辑摘要、策略框架、因子定义、公式、样本区间、回测方法和数据需求。

    禁止在未成功读取研报正文的情况下猜测策略逻辑。

    你必须在输出中记录：
    1. 读取了哪些研报文件；
    2. 是否成功提取正文；
    3. 提取了哪些核心信息；
    4. 输出了哪些文件；
    5. 是否存在无法识别或无法解析的内容。
  expected_output: >
    一份 Markdown 格式的研报摘要，包含研究背景、核心逻辑、策略方法、回测设计、
    数据需求和初步复现判断。

task_data_process:
  description: "读取 outputs/summary.md、outputs/data_requirements.md 和 raw_data/ 中的实际原始数据，编写完整的数据清洗 Python 脚本。严格遵守你的系统约束。"
  expected_output: "只输出可直接保存为 outputs/data_clean.py 并运行的纯 Python 代码，不要包含 Markdown 代码围栏或解释性散文。"

task_manager_review_data:
  description: "审查 outputs/data_clean.py，并基于 outputs/data_requirements.md 与 raw_data/ 的实际文件判断清洗逻辑是否合理。如果允许代码执行，应运行脚本；如果报错，记录可复现错误。"
  expected_output: "输出 Markdown 数据概述和审查结论，内容用于保存为 outputs/data_overview.md。"

task_reproduction:
  description: "读取 outputs/summary.md、outputs/data_requirements.md、outputs/data_overview.md、outputs/data_clean.py 和 raw_data/ 的实际数据结构，编写研报复现的 Python 回测代码。"
  expected_output: "只输出可直接保存为 outputs/backtest.py 并运行的纯 Python 代码，不要包含 Markdown 代码围栏或解释性散文。"

task_manager_review_code:
  description: "审查并运行 outputs/backtest.py。确保没有语法错误、明显逻辑漏洞、未来函数和错误读取路径。"
  expected_output: "回测代码的运行结果日志和最终确认。"

task_summary:
  description: "读取 outputs/ 下的阶段产物和 logs/agents/ 下的 Agent 留痕，撰写一份项目最终总结报告。"
  expected_output: "包含项目背景、数据处理说明、代码执行情况的 Markdown 文档。"
